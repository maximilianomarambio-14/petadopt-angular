<app-navbar></app-navbar>

<div class="container mt-5">

  <div class="text-center mb-5">
    <h1 class="fw-bold">🐾 PetAdopt</h1>
    <p class="text-muted">
      Sistema de Gestión de Adopción de Mascotas
    </p>
  </div>

  <div class="row g-4">

    <!-- Mascotas -->
    <div class="col-md-3">
      <div class="card text-center shadow border-0 h-100">
        <div class="card-body">
          <div style="font-size:55px;">🐶</div>
          <h5 class="mt-3">Mascotas</h5>
          <h2 class="text-primary">{{ totalMascotas }}</h2>

          <a
            routerLink="/mascotas"
            class="btn btn-primary w-100 mt-3">

            Administrar

          </a>

        </div>
      </div>
    </div>

    <!-- Disponibles -->
    <div class="col-md-3">
      <div class="card text-center shadow border-0 h-100">
        <div class="card-body">

          <div style="font-size:55px;">🟢</div>

          <h5 class="mt-3">Disponibles</h5>

          <h2 class="text-success">
            {{ disponibles }}
          </h2>

          <small class="text-muted">
            Listas para adopción
          </small>

        </div>
      </div>
    </div>

    <!-- Adoptadas -->
    <div class="col-md-3">
      <div class="card text-center shadow border-0 h-100">
        <div class="card-body">

          <div style="font-size:55px;">🏠</div>

          <h5 class="mt-3">Adoptadas</h5>

          <h2 class="text-warning">
            {{ adoptadas }}
          </h2>

          <small class="text-muted">
            Hogares felices
          </small>

        </div>
      </div>
    </div>

    <!-- Solicitudes -->
    <div class="col-md-3">
      <div class="card text-center shadow border-0 h-100">
        <div class="card-body">

          <div style="font-size:55px;">📋</div>

          <h5 class="mt-3">Solicitudes</h5>

          <h2 class="text-danger">
            {{ solicitudes }}
          </h2>

          <a
            routerLink="/adopcion"
            class="btn btn-danger w-100 mt-3">

            Ver Solicitudes

          </a>

        </div>
      </div>
    </div>

  </div>

</div>
